<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullThrottle — Créer mon mot de passe</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <script src="i18n.js"></script>
</head>
<body>

<div class="login-page">
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="login-card">

        <div class="login-logo">
            <div class="login-logo-icon">🔑</div>
            <div class="login-logo-text">FullThrottle</div>
            <div class="login-logo-sub" id="setpwd-sub" data-i18n="setpwd_sub"></div>
        </div>

        <div class="login-error" id="error-msg" style="display:none"></div>
        <div class="login-success" id="success-msg" style="display:none"></div>

        <div class="login-form" id="form-section">
            <div class="form-group">
                <label class="form-label" data-i18n="setpwd_new"></label>
                <input class="form-input" id="password" type="password"
                    data-i18n-placeholder="setpwd_new_ph"
                    onkeydown="if(event.key==='Enter') setPassword()">
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="setpwd_confirm"></label>
                <input class="form-input" id="password-confirm" type="password"
                    data-i18n-placeholder="setpwd_confirm_ph"
                    onkeydown="if(event.key==='Enter') setPassword()">
            </div>
            <button class="btn-login" id="btn-set" onclick="setPassword()">
                <span id="btn-text" data-i18n="setpwd_btn"></span>
            </button>
        </div>

    </div>
</div>

<style>
/* Message de succès */
.login-success {
    background: rgba(74, 222, 128, 0.1);
    border: 1px solid rgba(74, 222, 128, 0.3);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: #4ade80;
    margin-bottom: 20px;
    text-align: center;
}
</style>

<script>
// ============================================================
//   set-password.html
//
//   Quand Supabase envoie un email d'invitation ou de reset,
//   le lien ressemble à :
//   https://ton-site.vercel.app/set-password.html#access_token=XXX&type=invite
//
//   Le token est dans le HASH de l'URL (après le #).
//   On le lit avec window.location.hash, on l'envoie à
//   Supabase pour valider et créer le mot de passe.
// ============================================================

const SUPABASE_URL      = 'https://gathpbjhirtksasfmicn.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_DCM5-BubeSaz0ipRero-7Q_9KXu2WU7';

// ============================================================
//   Lecture du token depuis le hash de l'URL
//
//   window.location.hash retourne : "#access_token=XXX&type=invite"
//   On le parse comme des paramètres URL classiques.
// ============================================================

function getHashParams() {
    const hash   = window.location.hash.substring(1); // retire le #
    const params = new URLSearchParams(hash);
    return {
        accessToken: params.get('access_token'),
        type:        params.get('type'), // "invite" ou "recovery"
    };
}

// Vérifie au chargement qu'on a bien un token dans l'URL
window.addEventListener('DOMContentLoaded', () => {
    const { accessToken, type } = getHashParams();

    if (!accessToken) {
        showError(typeof t === 'function' ? t('setpwd_invalid') : 'Lien invalide ou expiré.');
        document.getElementById('form-section').style.display = 'none';
        return;
    }

    // Adapte le titre selon le type
    if (type === 'recovery') {
        document.getElementById('setpwd-sub').textContent = typeof t === 'function' ? t('setpwd_sub') : 'Réinitialiser';
        document.getElementById('btn-text').textContent = typeof t === 'function' ? t('setpwd_btn_reset') : 'Réinitialiser';
    }
});


// ============================================================
//   setPassword() — Envoie le nouveau mot de passe à Supabase
//
//   Supabase endpoint : PUT /auth/v1/user
//   Header : Authorization: Bearer ACCESS_TOKEN
//   Corps  : { password: "nouveau_mdp" }
// ============================================================

async function setPassword() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('password-confirm').value;
    const btn      = document.getElementById('btn-set');
    const btnText  = document.getElementById('btn-text');

    // Validation
    if (!password || password.length < 6) {
        showError(typeof t === 'function' ? t('setpwd_short') : 'Minimum 6 caractères.');
        return;
    }
    if (password !== confirm) {
        showError(typeof t === 'function' ? t('setpwd_mismatch') : 'Les mots de passe ne correspondent pas.');
        return;
    }

    const { accessToken } = getHashParams();
    if (!accessToken) {
        showError('Token manquant. Redemande un email d\'invitation.');
        return;
    }

    // État chargement
    btn.disabled    = true;
    btnText.textContent = typeof t === 'function' ? t('setpwd_btn_loading') : '⏳ Enregistrement…';

    try {
        // Appel Supabase pour définir le mot de passe
        // On utilise l'access_token du lien comme Bearer token
        const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
            method: 'PUT',
            headers: {
                'apikey':        SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${accessToken}`,
                'Content-Type':  'application/json',
            },
            body: JSON.stringify({ password }),
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.message || data.msg || 'Erreur lors de la création du mot de passe');
        }

        // Succès — affiche le message et redirige vers login
        document.getElementById('form-section').style.display = 'none';
        showSuccess(typeof t === 'function' ? t('setpwd_success') : '✅ Mot de passe créé !');

        // Redirige vers login après 2 secondes
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);

    } catch (error) {
        showError(error.message);
        btn.disabled    = false;
        btnText.textContent = typeof t === 'function' ? t('setpwd_btn') : 'Créer mon mot de passe';
    }
}

function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent   = '⚠ ' + msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
}

function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent   = msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
}
</script>
</body>
</html>
